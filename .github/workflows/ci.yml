name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint hooks
        run: shellcheck hooks/*.sh

      - name: Lint tests
        run: shellcheck tests/hooks/*.sh tests/integration/*.sh tests/run-all.sh

  hook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make hooks executable
        run: chmod +x hooks/*.sh

      - name: Run all tests
        run: bash tests/run-all.sh

  cli-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify CLI loads
        run: |
          node bin/cc-path.js --version
          node bin/cc-path.js --help
        working-directory: cli
